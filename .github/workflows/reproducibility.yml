name: Reproducibility

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  fresh-environment:
    name: Fresh Environment (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Lint
        run: ruff check .

      - name: Type check
        run: mypy .

      - name: Tests
        run: pytest -q

  docker-reproducibility:
    name: Docker Reproducibility
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t pytagrelease-repro .

      - name: Run checks in Docker
        run: docker run --rm pytagrelease-repro
